<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Animación</title>
<style>
  /* Centramos todo en la pantalla de forma responsiva */
  body {
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    background-color: #ffffff;
  }
  
  #animation-container {
    width: 100%;
    max-width: 680px; /* Evita que se estire más allá de su tamaño original */
    display: flex;
    flex-direction: column;
  }

  #controls { 
    display: flex; 
    align-items: center; 
    gap: 14px; 
    margin-top: 12px; 
    font-size: 13px; 
    color: #555; 
  }
  
  #controls input[type=range] { 
    flex: 1; 
  }
  
  #val-label { 
    min-width: 64px; 
    text-align: right; 
    font-weight: 500; 
    color: #333; 
  }
  
  .btn { 
    background: none; 
    border: 1px solid #ccc; 
    border-radius: 6px; 
    padding: 4px 14px; 
    cursor: pointer; 
    font-size: 13px; 
    color: #333; 
  }
  
  .btn:hover { 
    background: #f0f0f0; 
  }
</style>
</head>
<body>

<div id="animation-container">
  <canvas id="c" width="680" height="540" style="width: 100%; height: auto; max-height: 75vh; object-fit: contain; border-radius: 12px; border: 1px solid #eee;"></canvas>

  <div id="controls">
    <button class="btn" id="play-btn" onclick="togglePlay()">⏸ Pausar</button>
    <span style="font-style:italic">t</span>
    <input type="range" id="t-slider" min="0" max="100" value="0" step="1"
           oninput="setT(+this.value/100); playing=false; document.getElementById('play-btn').textContent='▶ Reproducir';">
    <span id="val-label">t = 0.00</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 680, H = 540;

// ── helpers ──────────────────────────────────────────────────
function ease(x){ return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2; }
function bez(t,p0,p1,p2,p3){const u=1-t;return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;}
function quadBez(t,x0,y0,cx,cy,x1,y1){
  const u=1-t;
  return {x:u*u*x0+2*u*t*cx+t*t*x1, y:u*u*y0+2*u*t*cy+t*t*y1};
}

// ── TUBE geometry ─────────────────────────────────────────────
function tubeY(nx){
  let top,bot;
  if(nx<=0.5){const s=nx/0.5;
    top=quadBez(s,128,78,210,42,390,58);
    bot=quadBez(s,128,128,210,148,390,135);
  } else {const s=(nx-0.5)/0.5;
    top=quadBez(s,390,58,510,72,582,80);
    bot=quadBez(s,390,135,510,135,582,132);
  }
  return {mid:(top.y+bot.y)/2, half:(bot.y-top.y)/2, topY:top.y, botY:bot.y};
}
const NX_MAX=0.88;

// ── T-plane geometry ─────────────────────────────────────────
const TL={x:70,y:310}, TR={x:440,y:310}, BR={x:530,y:500}, BL={x:160,y:500};
const TAU0={x:210,y:428};

function getTauPos(te){
  return {
    x:bez(te,210,230,330,372),
    y:bez(te,428,402,368,348)
  };
}

// ── TORUS drawing (2D projection, fixed at tau0 area above T-plane) ──
const TX=210, TY=240; 
const TR_big=38, TR_small=16; 

function drawTorus(alpha){
  ctx.save();
  ctx.globalAlpha = alpha;

  // back half of torus body
  for(let i=180;i<=360;i+=2){
    const u=i*Math.PI/180;
    for(let j=0;j<=360;j+=8){
      const v=j*Math.PI/180;
      const x=TX+(TR_big+TR_small*Math.cos(v))*Math.cos(u);
      const y=TY+(TR_big+TR_small*Math.cos(v))*Math.sin(u)*0.38+TR_small*Math.sin(v)*0.7;
      if(j===0){ctx.beginPath();ctx.moveTo(x,y);}
      else ctx.lineTo(x,y);
    }
  }

  const torusPath = new Path2D();
  for(let seg=0;seg<2;seg++){
    const uStart=seg===0?0:Math.PI, uEnd=seg===0?Math.PI:Math.PI*2;
    const steps=60;
    let first=true;
    for(let i=0;i<=steps;i++){
      const u=uStart+(uEnd-uStart)*i/steps;
      const x=TX+(TR_big+TR_small)*Math.cos(u);
      const y=TY+(TR_big+TR_small)*Math.sin(u)*0.38;
      if(first){torusPath.moveTo(x,y);first=false;}
      else torusPath.lineTo(x,y);
    }
  }

  ctx.globalAlpha=alpha*0.25;
  for(let j=0;j<=360;j+=12){
    const v=j*Math.PI/180;
    const dx=TR_small*Math.cos(v);
    const dy=TR_small*Math.sin(v)*0.7;
    ctx.beginPath();
    ctx.ellipse(TX+dx, TY+dy, TR_big, TR_big*0.38, 0, 0, Math.PI*2);
    ctx.strokeStyle='#AFA9EC';
    ctx.lineWidth=0.6;
    ctx.stroke();
  }

  ctx.globalAlpha=alpha*0.85;
  ctx.beginPath();
  ctx.ellipse(TX, TY, TR_big+TR_small, (TR_big+TR_small)*0.38, 0, 0, Math.PI*2);
  ctx.strokeStyle='#534AB7';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(TX, TY, TR_big-TR_small, (TR_big-TR_small)*0.38, 0, 0, Math.PI*2);
  ctx.strokeStyle='#534AB7';
  ctx.lineWidth=1;
  ctx.stroke();

  ctx.globalAlpha=alpha*0.18;
  ctx.beginPath();
  ctx.ellipse(TX, TY, TR_big+TR_small, (TR_big+TR_small)*0.38, 0, 0, Math.PI*2);
  ctx.fillStyle='#AFA9EC';
  ctx.fill();

  ctx.globalAlpha=alpha*0.22;
  for(let u=0;u<Math.PI*2;u+=Math.PI/3){
    const cx2=TX+TR_big*Math.cos(u);
    const cy2=TY+TR_big*Math.sin(u)*0.38;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2, TR_small, TR_small*0.7, 0, 0, Math.PI*2);
    ctx.strokeStyle='#7F77DD';
    ctx.lineWidth=0.7;
    ctx.stroke();
  }

  ctx.globalAlpha=alpha*1.0;
  const loopV=0.28; 
  ctx.beginPath();
  let firstPt=true;
  for(let i=0;i<=120;i++){
    const u=(2*Math.PI*i/120);
    const x=TX+(TR_big+TR_small*Math.cos(loopV))*Math.cos(u);
    const y=TY+(TR_big+TR_small*Math.cos(loopV))*Math.sin(u)*0.38+TR_small*Math.sin(loopV)*0.7;
    if(firstPt){ctx.moveTo(x,y);firstPt=false;}
    else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.strokeStyle='#D85A30';
  ctx.lineWidth=2.8;
  ctx.stroke();

  const arrowU=Math.PI*0.55;
  const x1=TX+(TR_big+TR_small*Math.cos(loopV))*Math.cos(arrowU);
  const y1=TY+(TR_big+TR_small*Math.cos(loopV))*Math.sin(arrowU)*0.38+TR_small*Math.sin(loopV)*0.7;
  const x2=TX+(TR_big+TR_small*Math.cos(loopV))*Math.cos(arrowU+0.15);
  const y2=TY+(TR_big+TR_small*Math.cos(loopV))*Math.sin(arrowU+0.15)*0.38+TR_small*Math.sin(loopV)*0.7;
  const ang=Math.atan2(y2-y1,x2-x1);
  ctx.save();
  ctx.translate(x2,y2);
  ctx.rotate(ang);
  ctx.beginPath();
  ctx.moveTo(0,0);ctx.lineTo(-10,-5);ctx.lineTo(-10,5);ctx.closePath();
  ctx.fillStyle='#D85A30';ctx.fill();
  ctx.restore();

  ctx.globalAlpha=alpha;
  ctx.font='italic bold 15px serif';
  ctx.fillStyle='#993C1D';
  ctx.fillText('γ', TX+TR_big+TR_small+6, TY-4);
  ctx.font='10px serif';
  ctx.fillText('τ₀', TX+TR_big+TR_small+17, TY+2);

  ctx.font='italic 12px serif';
  ctx.fillStyle='#3C3489';
  ctx.fillText('X', TX-14, TY+TR_big*0.38+TR_small*0.7+22);
  ctx.font='9px serif';
  ctx.fillText('τ₀', TX-4, TY+TR_big*0.38+TR_small*0.7+28);

  ctx.globalAlpha=1;
  ctx.restore();
}

// ── DRAW ─────────────────────────────────────────────────────
function draw(t){
  ctx.clearRect(0,0,W,H);
  const te=ease(t);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(TL.x,TL.y);ctx.lineTo(TR.x,TR.y);
  ctx.lineTo(BR.x,BR.y);ctx.lineTo(BL.x,BL.y);ctx.closePath();
  ctx.fillStyle='rgba(83,74,183,0.07)';ctx.fill();
  ctx.strokeStyle='#534AB7';ctx.lineWidth=1;ctx.globalAlpha=0.6;ctx.stroke();
  ctx.restore();

  ctx.save();ctx.globalAlpha=0.18;ctx.strokeStyle='#7F77DD';ctx.lineWidth=0.5;
  [[160,500,100,330],[260,500,185,320],[360,500,270,315]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  [[70,375,440,375],[70,430,440,430],[105,460,475,460]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  ctx.restore();

  ctx.font='italic bold 18px serif';ctx.fillStyle='#3C3489';
  ctx.fillText('T',500,498);

  ctx.beginPath();ctx.arc(TAU0.x,TAU0.y,4,0,Math.PI*2);
  ctx.fillStyle='#3C3489';ctx.fill();
  ctx.font='italic 13px serif';ctx.fillStyle='#3C3489';
  ctx.fillText('τ₀',TAU0.x-14,TAU0.y+18);

  ctx.font='italic 14px serif';ctx.fillStyle='#D85A30';
  ctx.fillText('V',390,345);
  ctx.font='10px serif';ctx.fillText('γ',402,350);

  if(te>0.01){
    ctx.beginPath();
    ctx.moveTo(TAU0.x,TAU0.y);
    for(let i=1;i<=60;i++){
      const p=getTauPos((i/60)*te);
      ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle='#D85A30';ctx.lineWidth=2.2;
    ctx.lineJoin='round';ctx.stroke();
  }

  const tau=getTauPos(te);
  ctx.beginPath();ctx.arc(tau.x,tau.y,5,0,Math.PI*2);
  ctx.fillStyle='#EF9F27';ctx.strokeStyle='#D85A30';ctx.lineWidth=1.5;
  ctx.fill();ctx.stroke();
  ctx.font='italic 13px serif';ctx.fillStyle='#EF9F27';
  ctx.fillText('τ',tau.x+10,tau.y-8);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(128,78);
  ctx.quadraticCurveTo(210,42,390,58);
  ctx.quadraticCurveTo(510,72,582,80);
  ctx.lineTo(582,132);
  ctx.quadraticCurveTo(510,135,390,135);
  ctx.quadraticCurveTo(210,148,128,128);
  ctx.closePath();
  const grad=ctx.createLinearGradient(128,0,582,0);
  grad.addColorStop(0,'rgba(93,202,165,0.18)');
  grad.addColorStop(0.5,'rgba(127,119,221,0.13)');
  grad.addColorStop(1,'rgba(239,159,39,0.22)');
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();ctx.moveTo(128,78);
  ctx.quadraticCurveTo(210,42,390,58);
  ctx.quadraticCurveTo(510,72,582,80);
  ctx.strokeStyle='#534AB7';ctx.lineWidth=1.6;ctx.stroke();
  
  ctx.beginPath();ctx.moveTo(128,128);
  ctx.quadraticCurveTo(210,148,390,135);
  ctx.quadraticCurveTo(510,135,582,132);
  ctx.strokeStyle='#534AB7';ctx.lineWidth=1.6;ctx.stroke();

  ctx.beginPath();ctx.ellipse(128,103,10,25,0,0,Math.PI*2);
  ctx.fillStyle='#E1F5EE';ctx.fill();
  ctx.strokeStyle='#0F6E56';ctx.lineWidth=1.2;ctx.stroke();

  ctx.beginPath();ctx.ellipse(582,106,9,26,0,0,Math.PI*2);
  ctx.fillStyle='#FAEEDA';ctx.fill();ctx.globalAlpha=0.75;
  ctx.strokeStyle='#BA7517';ctx.lineWidth=1.2;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.restore();

  ctx.font='italic bold 13px serif';ctx.fillStyle='#3C3489';
  ctx.fillText('γ',108,65);
  ctx.font='9px serif';ctx.fillStyle='#3C3489';
  ctx.fillText('τ₀',118,69);

  const nx=te*NX_MAX;
  const cx2=128+nx*(582-128);
  const {mid,half,topY}=tubeY(nx);
  const ry=Math.max(5,half*0.82);

  if(te>0.01){
    ctx.save();ctx.globalAlpha=0.15;
    ctx.beginPath();ctx.ellipse(cx2,mid,ry*0.55,ry+10,Math.PI/2,0,Math.PI*2);
    ctx.fillStyle='#EF9F27';ctx.fill();ctx.restore();
    
    ctx.beginPath();ctx.ellipse(cx2,mid,ry*0.45,ry,Math.PI/2,0,Math.PI*2);
    ctx.strokeStyle='#D85A30';ctx.lineWidth=2.6;ctx.stroke();
    
    ctx.font='italic bold 13px serif';ctx.fillStyle='#BA7517';
    const lx=Math.min(cx2-6,554);
    ctx.fillText('γ',lx,topY-8);
    ctx.font='9px serif';ctx.fillText('τ',lx+10,topY-4);
  }

  drawTorus(1.0);

  ctx.save();
  ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(TX,TY+TR_big*0.38+TR_small*0.7+35);
  ctx.lineTo(TAU0.x,TAU0.y-5);
  ctx.strokeStyle='#888780';ctx.lineWidth=1;ctx.globalAlpha=0.6;ctx.stroke();
  
  ctx.globalAlpha=0.9;ctx.setLineDash([]);
  ctx.font='italic 12px serif';ctx.fillStyle='#5F5E5A';
  ctx.fillText('π',TX+8,TY+TR_big*0.38+TR_small*0.7+58);
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(TAU0.x,TAU0.y-5);
  ctx.lineTo(TAU0.x-4,TAU0.y-14);
  ctx.lineTo(TAU0.x+4,TAU0.y-14);
  ctx.closePath();
  ctx.fillStyle='#888780';ctx.globalAlpha=0.6;ctx.fill();
  ctx.restore();

  if(te>0.04){
    ctx.save();ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(cx2,mid+ry+3);
    ctx.lineTo(tau.x,tau.y-5);
    ctx.strokeStyle='#D85A30';ctx.lineWidth=0.9;ctx.globalAlpha=0.5;ctx.stroke();
    ctx.restore();
  }
}

// ── ANIMATION LOOP ────────────────────────────────────────────
let frame=0,playing=true,raf;
const totalFrames=240;

function setT(t){
  document.getElementById('t-slider').value=Math.round(t*100);
  document.getElementById('val-label').textContent='t = '+t.toFixed(2);
  draw(t);
}

function step(){
  if(!playing)return;
  frame++;
  if(frame>totalFrames+80)frame=0;
  const t=frame<totalFrames?frame/totalFrames:1;
  setT(t);
  raf=requestAnimationFrame(step);
}
function togglePlay(){
  playing=!playing;
  document.getElementById('play-btn').textContent=playing?'⏸ Pausar':'▶ Reproducir';
  if(playing)raf=requestAnimationFrame(step);
}

setT(0);
raf=requestAnimationFrame(step);
</script>

</body>
</html>
